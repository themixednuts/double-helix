os = "macos"
arch = "x86_64"
source = { archive = "https://github.com/vinhnx/VTCode/releases/download/0.96.14/vtcode-0.96.14-x86_64-apple-darwin.tar.gz" }
bin = "vtcode"
args = ["acp"]
env = { VT_ACP_ENABLED = "1", VT_ACP_ZED_ENABLED = "1" }

[[artifact]]
os = "linux"
arch = "x86_64"
source = { archive = "https://github.com/vinhnx/VTCode/releases/download/0.96.14/vtcode-0.96.14-x86_64-unknown-linux-gnu.tar.gz" }
bin = "vtcode"
args = ["acp"]
env = { VT_ACP_ENABLED = "1", VT_ACP_ZED_ENABLED = "1" }

[[artifact]]
