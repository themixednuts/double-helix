name = "pyright"
kind = "lsp"
description = "Python language server and type checker"
homepage = "https://github.com/microsoft/pyright"
languages = ["python"]

[version]
tag-source = "npm:pyright"

[[artifact]]
os = "windows"
arch = "x86_64"
source = { npm = "pyright", bin = "pyright-langserver" }
bin = "pyright-langserver"

[[artifact]]
os = "linux"
arch = "x86_64"
source = { npm = "pyright", bin = "pyright-langserver" }
bin = "pyright-langserver"

[[artifact]]
os = "macos"
arch = "aarch64"
source = { npm = "pyright", bin = "pyright-langserver" }
bin = "pyright-langserver"
